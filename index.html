<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arun's Neon Website</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <style>
    :root {
      --text-color: #fff;
      --card-bg: rgba(0, 0, 0, 0.6);
    }body {
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', sans-serif;
  color: var(--text-color);
  text-align: center;
  overflow-x: hidden;
  position: relative;
}

/* Animated Background */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: url('188.gif') no-repeat center center/cover;
  filter: brightness(0.2) blur(8px);
  z-index: -1;
  animation: zoom 30s infinite alternate;
}

@keyframes zoom {
  0% { transform: scale(1); }
  100% { transform: scale(1.2); }
}

.navbar {
  background: rgba(0,0,0,0.8);
  padding: 12px;
  position: fixed;
  width: 100%;
  top: 0;
  z-index: 10;
}

.navbar a {
  color: #fff;
  text-decoration: none;
  margin: 0 15px;
  font-size: 1.1rem;
  transition: 0.3s;
}

.navbar a:hover {
  color: #ffa900;
  text-shadow: 0 0 8px #ff00de;
}

.content {
  margin-top: 100px;
}

.neon {
  font-size: 2.5rem;
  text-shadow: 0 0 10px #fff, 0 0 20px #ff00de, 0 0 40px #ff00de;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { text-shadow: 0 0 10px #fff, 0 0 20px #ff00de, 0 0 40px #ff00de; }
  50% { text-shadow: 0 0 20px #fff, 0 0 40px #ff00de, 0 0 60px #ff00de; }
}

.typing {
  border-right: 2px solid white;
  white-space: nowrap;
  overflow: hidden;
  display: inline-block;
  animation: typing 4s steps(30, end), blink 0.75s step-end infinite;
}

@keyframes typing {
  from { width: 0; }
  to { width: 100%; }
}

@keyframes blink {
  from, to { border-color: transparent; }
  50% { border-color: white; }
}

.neon-section, .skills-section {
  background: var(--card-bg);
  padding: 25px;
  margin: 40px auto;
  border-radius: 15px;
  max-width: 900px;
  box-shadow: 0 0 25px #ff00de;
}

.image-box {
  display: inline-block;
  width: 250px;
  margin: 15px;
  border-radius: 12px;
  overflow: hidden;
  background: #000;
  transition: transform 0.3s;
}

.image-box:hover {
  transform: scale(1.08);
}

.progress {
  background: #444;
  border-radius: 15px;
  height: 18px;
  margin-top: 5px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, #00ffc8, #ff00b3);
}

footer {
  background: rgba(0, 0, 0, 0.7);
  padding: 20px;
  color: #fff;
}

.social-icons a {
  color: white;
  margin: 0 10px;
  font-size: 24px;
}

.social-icons a:hover {
  color: #ff00de;
  text-shadow: 0 0 10px #ff00de;
}

  </style>
</head>
<body>
  <div class="navbar">
    <a href="#">Web Updates</a>
    <a href="#">Feedback</a>
    <a href="#">Profit</a>
  </div>  <div class="content">
    <h1 class="neon"><span class="typing">Welcome to Arun's Website!</span></h1><div class="neon-section">
  <h2 class="neon">About Me</h2>
  <p>Creative UI/UX Designer | Web Developer | Content Strategist</p>
  <p>Hello! I'm Arun, passionate about digital
