<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arun Deep | Nebula Core</title>
    <style>
        :root {
            --neon: #00f2ff;
            --pink: #ff00ff;
            --bg: #0a0a12;
            --card: rgba(255, 255, 255, 0.05);
            --glass: rgba(255, 255, 255, 0.1);
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #fff; background: radial-gradient(circle at top right, #1a0b2e, #0a0a12); min-height: 100vh; padding: 100px 20px; }
        
        .container { max-width: 1000px; margin: 0 auto; }
        header { position: fixed; top: 0; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 20px 50px; background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); border-bottom: 1px solid var(--glass); z-index: 100; }
        
        /* Gallery Layout */
        .archive-box { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--glass); margin-bottom: 30px; }
        .art-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .art-card { aspect-ratio: 16/9; background: #222; border-radius: 8px; border: 1px solid var(--glass); cursor: pointer; transition: 0.3s; }
        .art-card:hover { border-color: var(--neon); }

        /* Split Section */
        .bottom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        section { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid var(--glass); }
        
        /* Stack & Form */
        .skill-bar { height: 8px; background: #222; border-radius: 4px; margin: 5px 0 15px; overflow: hidden; }
        .skill-fill { height: 100%; background: linear-gradient(90deg, var(--neon), var(--pink)); border-radius: 4px; }
        input, textarea { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--glass); color: white; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        .btn-pulse { width: 100%; padding: 12px; background: linear-gradient(90deg, var(--neon), var(--pink)); border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 5px; transition: 0.3s; }
        .btn-pulse:hover { opacity: 0.8; }
    </style>
</head>
<body>

<header>
    <h1>ARUN_DEEP.SYS</h1>
    <nav>
        <span style="margin: 0 15px;">ABOUT</span>
        <span style="margin: 0 15px;">PROJECTS</span>
        <span style="margin: 0 15px;">GALLERY</span>
        <span style="margin: 0 15px;">SKILLS</span>
        <span style="margin: 0 15px;">CONTACT</span>
    </nav>
</header>

<div class="container">
    <div class="archive-box">
        <h2>> VISUAL ARCHIVE</h2>
        <div class="art-grid" style="margin-top:20px;">
            <div class="art-card"></div><div class="art-card"></div><div class="art-card"></div>
            <div class="art-card"></div><div class="art-card"></div><div class="art-card"></div>
        </div>
    </div>

    <div class="bottom-grid">
        <section>
            <h2>> TECH_STACK</h2>
            <p>#00ffff</p><div class="skill-bar"><div class="skill-fill" style="width:90%"></div></div>
            <p>#ff00ff</p><div class="skill-bar"><div class="skill-fill" style="width:80%"></div></div>
            <p>#Velocity</p><div class="skill-bar"><div class="skill-fill" style="width:70%"></div></div>
            <p>Gradient Fill</p><div class="skill-bar"><div class="skill-fill" style="width:95%"></div></div>
        </section>

        <section>
            <h2>> CONTACT</h2>
            <input type="text" placeholder="Name">
            <div style="display:flex; gap:10px;">
                <input type="email" placeholder="Email">
                <input type="tel" placeholder="Phone">
            </div>
            <textarea placeholder="Message" rows="3"></textarea>
            <button class="btn-pulse">PULSE, THE NEBULAE SPECTRUM</button>
        </section>
    </div>
</div>

</body>
</html>
