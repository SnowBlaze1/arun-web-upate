<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arun Deep | Dual Spectrum UI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; display: grid; grid-template-columns: 1fr 1fr; height: 100vh; overflow: hidden; }

        /* Dark Side (Nebula) */
        .dark-side { 
            background: radial-gradient(circle at center, #1b0f33, #000); 
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            color: #00f3ff; padding: 40px; display: flex; flex-direction: column; gap: 20px;
        }

        /* Light Side (Holo-Glass) */
        .light-side { 
            background: linear-gradient(135deg, #e0e7ff, #fbcfe8); 
            padding: 40px; display: flex; flex-direction: column; gap: 20px;
        }

        .panel { 
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2); padding: 20px; border-radius: 15px;
        }

        .light-side .panel { background: rgba(255,255,255,0.6); border: 1px solid #fff; }

        h2 { margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        
        .progress-bar { height: 8px; background: rgba(0,0,0,0.1); border-radius: 4px; margin: 10px 0; }
        .fill { height: 100%; background: linear-gradient(90deg, #00f3ff, #ff00ff); border-radius: 4px; }
    </style>
</head>
<body>

<div class="dark-side">
    <h1>CORE_&lt;DEVELOPER&gt;</h1>
    <div class="panel">
        <h2>WHO_AM_I?</h2>
        <p>Architecting digital realities with precision.</p>
    </div>
    <div class="panel">
        <h2>ACTIVE_PROJECTS</h2>
        <div class="progress-bar"><div class="fill" style="width: 70%;"></div></div>
    </div>
</div>

<div class="light-side">
    <h1 style="color: #333;">ARUN_DEEP.SYS</h1>
    <div class="panel">
        <h2>VISUAL ARCHIVE</h2>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div style="height: 80px; background: #ccc; border-radius: 8px;"></div>
            <div style="height: 80px; background: #ccc; border-radius: 8px;"></div>
        </div>
    </div>
    <div class="panel">
        <h2>TECH_STACK</h2>
        <div class="progress-bar"><div class="fill" style="width: 90%;"></div></div>
    </div>
</div>

</body>
</html>
