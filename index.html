<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arun Deep | Nebula Archive</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --neon: #00f2ff; --pink: #ff00ff; --bg: #0a0a12; --card: rgba(255, 255, 255, 0.05); --glass: rgba(255, 255, 255, 0.1); }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #fff; background: radial-gradient(circle at top right, #1a0b2e, #0a0a12); min-height: 100vh; padding-top: 100px; }
        
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        header { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; padding: 20px 50px; background: rgba(0,0,0,0.5); backdrop-filter: blur(15px); border-bottom: 1px solid var(--glass); z-index: 100; }
        
        section { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--glass); margin-bottom: 30px; }
        
        /* Archive Grid */
        .art-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .art-card { position: relative; aspect-ratio: 16/9; background: #000; border: 1px solid var(--glass); overflow: hidden; border-radius: 10px; }
        .art-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .art-card:hover img { transform: scale(1.1); }
        
        /* Bottom Split Layout */
        .bottom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        
        /* Tech Stack */
        .skill-bar { height: 8px; background: #222; border-radius: 4px; margin: 10px 0 20px; }
        .skill-fill { height: 100%; background: linear-gradient(90deg, var(--neon), var(--pink)); border-radius: 4px; }
        
        /* Form */
        input, textarea { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--glass); color: white; padding: 12px; margin-bottom: 10px; border-radius: 5px; }
        .btn-pulse { width: 100%; padding: 15px; background: linear-gradient(90deg, var(--neon), var(--pink)); border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

<header>
    <h1>ARUN_DEEP.SYS</h1>
    <nav><a href="#about" style="color:white; margin:0 15px;">ABOUT</a><a href="#apps" style="color:white; margin:0 15px;">PROJECTS</a><a href="#gallery" style="color:white; margin:0 15px;">GALLERY</a></nav>
</header>

<div class="container">
    <section id="gallery">
        <h2>> VISUAL ARCHIVE.DB</h2>
        <div class="art-grid" style="margin-top:20px;">
            <div class="art-card"><img src="1.web.jpeg"></div><div class="art-card"><img src="2.web.jpeg"></div><div class="art-card"><img src="3.web.jpeg"></div>
            <div class="art-card"><img src="4.web.jpeg"></div><div class="art-card"><img src="5.web.jpeg"></div><div class="art-card"><img src="6.web.jpeg"></div>
            <div class="art-card"><img src="7.web.jpeg"></div><div class="art-card"><img src="133.jpg"></div><div class="art-card"><img src="9.web.jpeg"></div>
        </div>
    </section>

    <div class="bottom-grid">
        <section id="skills">
            <h2>> TECH_STACK</h2>
            <p>#00ffff</p><div class="skill-bar"><div class="skill-fill" style="width:90%"></div></div>
            <p>#ff00ff</p><div class="skill-bar"><div class="skill-fill" style="width:85%"></div></div>
            <p>#Velocity</p><div class="skill-bar"><div class="skill-fill" style="width:75%"></div></div>
            <p>Gradient Fill</p><div class="skill-bar"><div class="skill-fill" style="width:95%"></div></div>
        </section>

        <section id="contact">
            <h2>> CONTACT</h2>
            <input type="text" placeholder="Name">
            <div style="display:flex; gap:10px;">
                <input type="email" placeholder="Email"><input type="tel" placeholder="Phone">
            </div>
            <textarea placeholder="Message" rows="3"></textarea>
            <button class="btn-pulse">PULSE, THE NEBULAE SPECTRUM</button>
        </section>
    </div>
</div>

</body>
</html>
