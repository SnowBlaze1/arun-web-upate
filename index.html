<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arun Deep | Nebula Core v2.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --neon: #00f2ff; --pink: #ff00ff; --bg: #0a0a12; --card: rgba(255, 255, 255, 0.05);
        }
        body.light { --neon: #0066ff; --pink: #ff0088; --bg: #f0f2f5; --card: rgba(0,0,0,0.05); color: #222; }
        
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; transition: 0.3s; }
        body { background: var(--bg); color: #fff; min-height: 100vh; padding-top: 80px; }
        
        header { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; padding: 20px 50px; background: rgba(0,0,0,0.5); backdrop-filter: blur(15px); z-index: 1000; }
        
        .hero { min-height: 60vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        /* Original Project Cards */
        .app-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 50px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        
        /* Screenshot Layout */
        .archive-box { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 30px; }
        .art-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .art-card { aspect-ratio: 16/9; background: #222; border-radius: 8px; }
        
        .bottom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        section { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        
        .btn { padding: 10px 20px; background: linear-gradient(90deg, var(--neon), var(--pink)); border: none; color: white; cursor: pointer; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>ARUN_DEEP.SYS</h1>
    <nav>
        <a href="#about" style="color:inherit; margin:0 10px;">ABOUT</a>
        <a href="#projects" style="color:inherit; margin:0 10px;">PROJECTS</a>
        <button onclick="document.body.classList.toggle('light')" style="background:none; border:1px solid var(--neon); color:var(--neon); padding:5px 10px; cursor:pointer;">THEME_TOGGLE</button>
    </nav>
</header>

<div class="hero">
    <h1>NEBULA_DEVELOPER</h1>
    <p>// ARCHITECTING DIGITAL REALITIES</p>
</div>

<div class="container">
    <div id="projects" class="app-grid">
        <div class="card">
            <h3>Neural Audio</h3>
            <button class="btn" onclick="document.getElementById('m').classList.toggle('active')">Toggle Interface</button>
            <div id="m" style="display:none; margin-top:10px;">Player Active...</div>
        </div>
        <div class="card"><h3>Medi-Net</h3><button class="btn">Launch</button></div>
    </div>

    <div class="archive-box">
        <h2>> VISUAL ARCHIVE</h2>
        <div class="art-grid" style="margin-top:20px;">
            <div class="art-card"></div><div class="art-card"></div><div class="art-card"></div>
            <div class="art-card"></div><div class="art-card"></div><div class="art-card"></div>
        </div>
    </div>

    <div class="bottom-grid">
        <section>
            <h2>> TECH_STACK</h2>
            <div style="height:8px; background:#333; margin:10px 0; border-radius:5px;"><div style="width:90%; height:100%; background:var(--neon);"></div></div>
            <div style="height:8px; background:#333; margin:10px 0; border-radius:5px;"><div style="width:80%; height:100%; background:var(--pink);"></div></div>
        </section>
        <section>
            <h2>> CONTACT</h2>
            <input type="text" placeholder="Identity" style="width:100%; padding:8px; margin-bottom:5px;">
            <button class="btn" style="width:100%;">PULSE_UPLINK</button>
        </section>
    </div>
</div>

</body>
</html>
