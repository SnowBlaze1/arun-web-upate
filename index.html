<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- SEO Meta Tags -->
  <title>Arun's Website | Web Developer & UI/UX Designer</title>
  <meta name="description" content="Arun - Creative UI/UX Designer, Web Developer, and Content Strategist. Passionate about crafting engaging digital experiences with modern web technologies." />
  <meta name="keywords" content="Arun, Web Developer, UI UX Designer, Portfolio, HTML, CSS, JavaScript, React, Node.js, Creative Designer, Web Design, Frontend Developer, Backend Developer" />
  <meta name="author" content="Arun" />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph (Social Media Preview) -->
  <meta property="og:title" content="Arun's Website | Web Developer & UI/UX Designer" />
  <meta property="og:description" content="Explore Arun's portfolio showcasing web development, UI/UX design, and creative digital projects." />
  <meta property="og:image" content="https://arun-web-upate-y52i.vercel.app/preview.png" />
  <meta property="og:url" content="https://arun-web-upate-y52i.vercel.app/" />
  <meta property="og:type" content="website" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Arun's Website | Web Developer & UI/UX Designer" />
  <meta name="twitter:description" content="Creative UI/UX Designer & Web Developer. Check out my projects and skills." />
  <meta name="twitter:image" content="https://arun-web-upate-y52i.vercel.app/preview.png" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <!-- Icons & Styles -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0; padding: 0;
      background: linear-gradient(to right, #2c3e50, #3498db);
      color: white;
      scroll-behavior: smooth;
      transition: background 0.6s ease;
    }
    header {
      text-align: center;
      padding: 2rem;
      background: rgba(0,0,0,0.4);
    }
    h1 {
      font-size: 2.5rem;
      animation: fadeInDown 1.2s ease;
    }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-40px);}
      to { opacity: 1; transform: translateY(0);}
    }
    section {
      padding: 2rem;
      animation: fadeIn 1.2s ease;
    }
    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }
    .skills, .languages {
      margin-top: 2rem;
    }
    .bar {
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      margin: 0.5rem 0;
      overflow: hidden;
    }
    .bar-fill {
      display: flex;
      align-items: center;
      padding-left: 10px;
      height: 30px;
      border-radius: 20px;
      font-size: 14px;
      color: #fff;
      animation: glow 2s infinite alternate;
    }
    @keyframes glow {
      from { box-shadow: 0 0 5px #fff; }
      to { box-shadow: 0 0 20px #0ff; }
    }
    /* Contact Form */
    form {
      max-width: 400px;
      margin: auto;
      display: flex;
      flex-direction: column;
    }
    input, textarea {
      margin: 0.5rem 0;
      padding: 10px;
      border: none;
      border-radius: 8px;
      outline: none;
    }
    button {
      padding: 10px;
      background: #e67e22;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: #fff;
      font-weight: bold;
      transition: background 0.3s;
    }
    button:hover {
      background: #d35400;
    }
    /* Scroll to Top Button */
    #scrollTopBtn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0,0,0,0.7);
      border: none;
      color: white;
      font-size: 20px;
      padding: 12px 16px;
      border-radius: 50%;
      cursor: pointer;
      display: none;
      transition: background 0.3s;
    }
    #scrollTopBtn:hover {
      background: #3498db;
      box-shadow: 0 0 15px #0ff;
    }
  </style>
</head>
<body>
  <header>
    <h1>Welcome to My Portfolio</h1>
  </header>

  <section class="skills">
    <h2>My Skills</h2>
    <div class="bar"><div class="bar-fill" style="width:90%; background:#2980b9;"><i class="fab fa-html5"></i>&nbsp; HTML & CSS</div></div>
    <div class="bar"><div class="bar-fill" style="width:80%; background:#f39c12;"><i class="fab fa-js"></i>&nbsp; JavaScript</div></div>
    <div class="bar"><div class="bar-fill" style="width:75%; background:#8e44ad;"><i class="fas fa-pencil-ruler"></i>&nbsp; UI/UX Design</div></div>
    <div class="bar"><div class="bar-fill" style="width:85%; background:#16a085;"><i class="fas fa-code"></i>&nbsp; Web Development</div></div>
    <div class="bar"><div class="bar-fill" style="width:70%; background:#27ae60;"><i class="fab fa-node"></i>&nbsp; Node.js</div></div>
    <div class="bar"><div class="bar-fill" style="width:75%; background:#61dafb; color:#000;"><i class="fab fa-react"></i>&nbsp; React</div></div>
  </section>

  <section class="languages">
    <h2>Languages Known</h2>
    <div class="bar"><div class="bar-fill" style="width:95%; background:#2ecc71;"><i class="fas fa-language"></i>&nbsp; English</div></div>
    <div class="bar"><div class="bar-fill" style="width:90%; background:#e74c3c;"><i class="fas fa-language"></i>&nbsp; Hindi</div></div>
    <div class="bar"><div class="bar-fill" style="width:60%; background:#3498db;"><i class="fas fa-language"></i>&nbsp; German</div></div>
    <div class="bar"><div class="bar-fill" style="width:50%; background:#9b59b6;"><i class="fas fa-language"></i>&nbsp; Japanese</div></div>
  </section>

  <section>
    <h2>Contact Me</h2>
    <form action="https://formspree.io/f/xwpnabab" method="POST">
      <input type="text" name="name" placeholder="Your Name" required />
      <input type="email" name="email" placeholder="Your Email" required />
      <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
      <button type="submit">Send Message</button>
    </form>
  </section>

  <!-- Scroll to Top Button -->
  <button id="scrollTopBtn" title="Go to top"><i class="fas fa-arrow-up"></i></button>

  <script>
    const btn = document.getElementById("scrollTopBtn");
    window.onscroll = function() {
      if (document.body.scrollTop > 200 || document.documentElement.scrollTop > 200) {
        btn.style.display = "block";
      } else {
        btn.style.display = "none";
      }
    };
    btn.onclick = function() {
      window.scrollTo({ top: 0, behavior: "smooth" });
    };
  </script>
</body>
</html>
